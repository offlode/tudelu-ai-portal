<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tudelü AI Portal v2</title>
  <link rel="icon" type="image/png" href="/assets/logo.png">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #0F172A; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
    iframe {
      width: 100%;
      height: 100%;
      border: none;
      position: absolute;
      top: 0;
      left: 0;
    }
    .loading {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      z-index: 1;
    }
    .loading svg { width: 48px; height: 48px; margin-bottom: 16px; }
    .loading p { color: rgba(255,255,255,0.5); font-size: 14px; margin-bottom: 12px; }
    .spinner {
      width: 24px; height: 24px;
      border: 2px solid rgba(255,81,0,0.2);
      border-top-color: #ff5100;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-bottom: 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .version { color: rgba(255,255,255,0.3); font-size: 11px; margin-top: 8px; }
    .fallback { display: none; color: rgba(255,255,255,0.5); font-size: 13px; margin-top: 12px; }
    .fallback a { color: #ff5100; text-decoration: none; }
    .fallback a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="loading" id="loader">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 33.3 33.7" fill="none">
      <path fill="#fff" d="M16.65.311C3.531.311 0 7.908 0 16.966s3.491 16.732 16.65 16.732c13.157 0 16.649-7.555 16.649-16.692 0-9.136-3.454-16.695-16.65-16.695"/>
      <path fill="#FF5100" d="M22.256 17.003v-4.858h-4.86v-4.86h-4.86v14.579h4.86v-4.861zm.001 4.861h-4.86v4.861h4.86z"/>
    </svg>
    <div class="spinner"></div>
    <p>Loading Tudelü AI v2...</p>
    <span class="version">Powered by GPT-5.4</span>
    <div class="fallback" id="fallback">
      Taking longer than expected. <a href="https://www.perplexity.ai/computer/a/tudelu-ai-operations-platform-4pQNeNUsQee8PRny8n_sjg" target="_blank">Open V2 directly</a>
    </div>
  </div>
  <iframe 
    src="https://www.perplexity.ai/computer/a/tudelu-ai-operations-platform-4pQNeNUsQee8PRny8n_sjg" 
    id="portal" 
    allow="clipboard-write"
    onload="document.getElementById('loader').style.display='none';"
  ></iframe>
  <script>
    setTimeout(function() {
      document.getElementById('fallback').style.display = 'block';
    }, 8000);
  </script>
</body>
</html>
