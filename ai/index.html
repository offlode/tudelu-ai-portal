<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tudelü AI Portal</title>
  <link rel="icon" type="image/png" href="/assets/logo.png">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #111111; }
    iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }
    .loading {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #111111;
      z-index: 10;
      transition: opacity 0.4s ease;
    }
    .loading.hidden {
      opacity: 0;
      pointer-events: none;
    }
    .loading svg {
      width: 48px;
      height: 48px;
      margin-bottom: 16px;
    }
    .loading p {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      color: rgba(255,255,255,0.5);
      font-size: 14px;
    }
    .spinner {
      width: 24px;
      height: 24px;
      border: 2px solid rgba(255,81,0,0.2);
      border-top-color: #ff5100;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-top: 12px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="loading" id="loader">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 33.3 33.7" fill="none">
      <path fill="#fff" d="M16.65.311C3.531.311 0 7.908 0 16.966s3.491 16.732 16.65 16.732c13.157 0 16.649-7.555 16.649-16.692 0-9.136-3.454-16.695-16.65-16.695"/>
      <path fill="#FF5100" d="M22.256 17.003v-4.858h-4.86v-4.86h-4.86v14.579h4.86v-4.861zm.001 4.861h-4.86v4.861h4.86z"/>
    </svg>
    <p>Loading Tudelü AI Portal...</p>
    <div class="spinner"></div>
  </div>
  <iframe
    id="portal"
    src="https://www.perplexity.ai/computer/a/tudelu-ai-portal-v2-shcDVH0lTVi0UzZe15Se0w"
    allow="clipboard-read; clipboard-write"
    loading="eager"
  ></iframe>
  <script>
    const iframe = document.getElementById('portal');
    const loader = document.getElementById('loader');
    iframe.addEventListener('load', () => {
      setTimeout(() => loader.classList.add('hidden'), 300);
    });
    // Fallback: hide loader after 5s regardless
    setTimeout(() => loader.classList.add('hidden'), 5000);
  </script>
</body>
</html>
